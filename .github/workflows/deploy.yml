name: Deploy Auth Service

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ghcr.io/karpovyuri/caraudio-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            docker pull ghcr.io/karpovyuri/caraudio-backend:latest

            cat << EOF > ~/auth_service.env
            AUTH_DATABASE_USER="${{ secrets.AUTH_DATABASE_USER }}"
            AUTH_DATABASE_DBNAME="${{ secrets.AUTH_DATABASE_DBNAME }}"
            AUTH_DATABASE_PASSWORD="${{ secrets.AUTH_DATABASE_PASSWORD }}"
            AUTH_DATABASE_HOST="${{ secrets.AUTH_DATABASE_HOST }}"
            AUTH_JWT_SECRET="${{ secrets.AUTH_JWT_SECRET }}"            
            EOF
            
            docker stop auth-service-prod || true
            docker rm auth-service-prod || true

            docker run -d \
              --name auth-service-prod \
              --network auth-network \
              --restart unless-stopped \
              -p 8080:8080 \
              --env-file ~/auth_service.env \
              ghcr.io/karpovyuri/caraudio-backend:latest

            docker image prune -f