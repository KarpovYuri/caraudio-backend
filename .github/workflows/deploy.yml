name: Deploy Auth Service

on:
  push:
    branches:
      - main # или мастер, поменяй на свою ветку, если нужно

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/caraudio-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            docker stop auth-service-prod || true
            docker rm auth-service-prod || true

            docker pull ghcr.io/${{ github.repository_owner }}/caraudio-backend:latest

            cat << 'EOF' > ~/auth_service.env
            AUTH_JWT_SECRET="${{ secrets.AUTH_JWT_SECRET }}"
            AUTH_DATABASE_PASSWORD="${{ secrets.AUTH_DATABASE_PASSWORD }}"
            AUTH_GRPC_PORT=:50051
            AUTH_HTTP_PORT=:8080
            AUTH_ALLOWED_ORIGINS=http://localhost:4200
            AUTH_COOKIE_SECURE=false
            AUTH_HTTP_READ_TIMEOUT=15s
            AUTH_HTTP_WRITE_TIMEOUT=15s
            AUTH_HTTP_IDLE_TIMEOUT=60s
            AUTH_SHUTDOWN_TIMEOUT=15s
            AUTH_TOKEN_CLEANUP_EVERY=10m
            EOF

            docker run -d \
              --name auth-service-prod \
              --restart unless-stopped \
              -p 127.0.0.1:8080:8080 \
              -v ~/auth_service.env:/.env \
              ghcr.io/${{ github.repository_owner }}/caraudio-backend:latest

            docker image prune -f