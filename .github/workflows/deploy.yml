name: Deploy Auth Service

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ghcr.io/karpovyuri/caraudio-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            docker network create auth-network || true

            docker volume create postgres_data || true

            docker stop auth-service-prod || true
            docker rm auth-service-prod || true

            docker stop auth-postgres || true
            docker rm auth-postgres || true

            docker run -d \
              --name auth-postgres \
              --network auth-network \
              --restart unless-stopped \
              -e POSTGRES_USER=auth_db_user \
              -e POSTGRES_PASSWORD=${{ secrets.AUTH_DATABASE_PASSWORD }} \
              -e POSTGRES_DB=auth_db \
              -v postgres_data:/var/lib/postgresql/data \
              postgres:16

            until docker exec auth-postgres pg_isready -U auth_db_user; do
              sleep 2
            done

            cat << EOF > ~/auth_service.env
            AUTH_JWT_SECRET="${{ secrets.AUTH_JWT_SECRET }}"
            AUTH_DATABASE_HOST="auth-postgres"
            AUTH_DATABASE_PORT="5432"
            AUTH_DATABASE_USER="auth_db_user"
            AUTH_DATABASE_NAME="auth_db"
            AUTH_DATABASE_PASSWORD="${{ secrets.AUTH_DATABASE_PASSWORD }}"
            AUTH_DATABASE_SSLMODE="disable"
            AUTH_GRPC_PORT=:50051
            AUTH_HTTP_PORT=:8080
            AUTH_ALLOWED_ORIGINS=http://localhost:4200
            AUTH_COOKIE_SECURE=false
            AUTH_HTTP_READ_TIMEOUT=15s
            AUTH_HTTP_WRITE_TIMEOUT=15s
            AUTH_HTTP_IDLE_TIMEOUT=60s
            AUTH_SHUTDOWN_TIMEOUT=15s
            AUTH_TOKEN_CLEANUP_EVERY=10m
            EOF

            # ----------------------------
            # START BACKEND
            # ----------------------------
            docker pull ghcr.io/karpovyuri/caraudio-backend:latest

            docker run -d \
              --name auth-service-prod \
              --network auth-network \
              --restart unless-stopped \
              -p 8080:8080 \
              --env-file ~/auth_service.env \
              ghcr.io/karpovyuri/caraudio-backend:latest

            # ----------------------------
            # CLEANUP
            # ----------------------------
            docker image prune -f