version: "3.9"

services:
  auth-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: auth-service-app
    restart: always
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=auth_db_user
      - DB_PASSWORD=auth_db_password
      - DB_NAME=auth_db
    depends_on:
      - postgres
  postgres:
    image: postgres:16
    container_name: auth-postgres
    restart: always
    environment:
      POSTGRES_USER: auth_db_user
      POSTGRES_PASSWORD: auth_db_password
      POSTGRES_DB: auth_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: