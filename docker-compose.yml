services:
  auth-postgres:
    image: postgres:16
    container_name: auth-postgres
    restart: always
    environment:
      POSTGRES_USER: ${AUTH_DATABASE_USER}
      POSTGRES_PASSWORD: ${AUTH_DATABASE_PASSWORD}
      POSTGRES_DB: ${AUTH_DATABASE_DBNAME}
    ports:
      - "5432:5432"
    volumes:
      - auth_postgres_data:/var/lib/postgresql/data

  catalog-postgres:
    image: postgres:16
    container_name: catalog-postgres
    restart: always
    environment:
      POSTGRES_USER: ${CATALOG_DATABASE_USER}
      POSTGRES_PASSWORD: ${CATALOG_DATABASE_PASSWORD}
      POSTGRES_DB: ${CATALOG_DATABASE_DBNAME}
    ports:
      - "5433:5432"
    volumes:
      - catalog_postgres_data:/var/lib/postgresql/data

volumes:
  auth_postgres_data:
  catalog_postgres_data: